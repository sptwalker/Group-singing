<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDoo Sing · 管理后台</title>
    <link rel="stylesheet" href="css/admin.css?v=20260417b">
</head>
<body>
    <!-- 登录遮罩 -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div class="login-logo">🎵</div>
            <h1>YouDoo Sing</h1>
            <p class="login-subtitle">管理后台</p>
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUser" value="admin" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPass" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">登 录</button>
                <button type="button" class="btn-register-link" id="btnShowRegister">注册新管理员</button>
            </form>
            <form id="registerForm" class="register-form" autocomplete="off" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUser" placeholder="至少3个字符" required>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPass" placeholder="长于6位，包含数字和字母" required>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPassConfirm" placeholder="请再次输入密码" required>
                </div>
                <div class="form-group" id="regInviteGroup" style="display:none;">
                    <label>授权码</label>
                    <input type="text" id="regInvite" placeholder="请输入授权码">
                </div>
                <button type="submit" class="btn-login" id="btnRegister">注 册</button>
                <button type="button" class="btn-register-link" id="btnBackLogin">返回登录</button>
            </form>
        </div>
    </div>

    <!-- 主布局 -->
    <div id="appMain" class="app-layout" style="display:none;">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">🎵</span>
                <span class="brand-text">YouDoo Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-module="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a class="nav-item" data-module="songs">
                    <span class="nav-icon">🎶</span>
                    <span>歌曲库</span>
                </a>
                <a class="nav-item" data-module="editor">
                    <span class="nav-icon">✂️</span>
                    <span>分段编辑器</span>
                </a>
                <a class="nav-item" data-module="tasks">
                    <span class="nav-icon">📋</span>
                    <span>任务管理</span>
                </a>
                <a class="nav-item" data-module="export">
                    <span class="nav-icon">📦</span>
                    <span>合成导出</span>
                </a>
                <a class="nav-item" data-module="finals">
                    <span class="nav-icon">🎵</span>
                    <span>最终成曲</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="btnLogout" class="btn-logout">退出登录</button>
            </div>
        </aside>

        <!-- 内容区 -->
        <main class="main-content">
            <header class="topbar">
                <button id="btnMenuToggle" class="btn-menu-toggle">☰</button>
                <h2 id="pageTitle">仪表盘</h2>
                <div class="topbar-right">
                    <button id="btnAccountSettings" class="btn-account-settings" type="button">账号设置</button>
                    <span id="adminName" class="admin-name">admin</span>
                </div>
            </header>
            <div id="moduleContainer" class="module-container">
                <!-- 模块内容动态渲染 -->
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 模态框容器 -->
    <div id="modalContainer"></div>

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="js/admin-core.js?v=20260427a"></script>
    <script src="js/admin-modules.js?v=20260417b"></script>
    <script src="js/admin-editor.js?v=20260417b"></script>
    <script src="js/admin-editor2.js?v=20260417b"></script>
    <script src="js/admin-tasks.js?v=20260417c"></script>
    <script src="js/admin-super.js?v=20260427a"></script>



</body>
</html>
