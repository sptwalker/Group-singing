<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大家一起来拼歌</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css?v=20260418a">
</head>
<body>
    <div id="app" class="page login-page">
        <div class="login-header">
            <div class="logo-icon">&#127908;</div>
            <h1 class="app-title">大家一起来拼歌</h1>
            <p class="app-subtitle">和朋友们一起完成一首歌</p>
        </div>

        <div class="song-preview" id="songPreview">
            <div class="preview-title">正在进行的拼歌任务</div>
            <div class="song-list" id="songList">
                <div class="song-item skeleton"></div>
                <div class="song-item skeleton"></div>
                <div class="song-item skeleton"></div>
            </div>
        </div>

        <div class="login-bottom">
            <div class="login-form" id="loginForm">
                <input class="login-input" type="text" id="inputUsername" placeholder="用户名" autocomplete="username" maxlength="32" />
                <input class="login-input" type="password" id="inputPassword" placeholder="密码（6位以上）" autocomplete="current-password" />
                <button class="btn-submit" id="btnPasswordLogin" type="button">登录</button>
                <button class="btn-register" id="btnRegister" type="button">注册新账号</button>
            </div>

            <div class="login-divider" id="loginDivider">
                <span>或</span>
            </div>

            <button class="btn-wechat" id="btnLogin" type="button">
                <span class="wechat-icon">&#128172;</span>
                微信登录
            </button>
            <p class="login-tip">登录后即可参与拼歌</p>
        </div>
    </div>

    <script src="js/config.js?v=20260418d"></script>
    <script src="js/login.js?v=20260418d"></script>
</body>
</html>
