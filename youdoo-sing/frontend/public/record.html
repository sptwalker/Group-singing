<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>录音</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/record.css?v=20260417c">
</head>
<body>
    <div id="app" class="page record-page">
        <!-- 顶部 -->
        <div class="record-header">
            <button class="btn-back" id="btnBack">←</button>
            <div class="record-title-area">
                <div class="record-song-name" id="recSongName">加载中...</div>
                <div class="record-seg-info" id="recSegInfo"></div>
            </div>
        </div>

        <!-- 歌词区 -->
        <div class="lyrics-container">
            <div class="lyrics-arrow lyrics-arrow-left" style="display:none;">▶</div>
            <div class="lyrics-section" id="lyricsSection"></div>
        </div>

        <!-- 控制区 -->
        <div class="record-controls">
            <!-- 实时录音波形 -->
            <div class="live-wave-panel" id="liveWavePanel" style="display:none;">
                <canvas id="liveWaveCanvas" width="600" height="48"></canvas>
                <div class="live-wave-status">
                    <span class="live-wave-countdown" id="liveWaveCountdown"></span>
                    <span class="live-wave-label" id="liveWaveLabel">请准备</span>
                </div>
            </div>
            <div class="control-row">
                <button class="btn-record-ctrl btn-audition" id="btnAudition">▶ 播放试唱</button>
                <button class="btn-record-ctrl btn-record" id="btnRecord">🎤 录音</button>
            </div>
            <!-- 升降调控制 -->
            <div class="pitch-control" id="pitchControl">
                <button class="pitch-btn" id="btnPitchDown">-</button>
                <span class="pitch-label" id="pitchLabel">原调</span>
                <button class="pitch-btn" id="btnPitchUp">+</button>
            </div>
        </div>

        <!-- 底部录音卡片区 -->
        <div class="my-recordings-section">
            <div class="my-rec-title">
                <span>我的录音</span>
                <span class="my-rec-count"><span id="recCount">0</span>/5</span>
            </div>
            <div class="my-rec-list" id="myRecList"></div>
            <div class="my-rec-actions" id="recActions" style="display:none;">
                <button class="btn-rec-play" id="btnRecPlay">▶ 播放</button>
                <button class="btn-rec-delete" id="btnRecDelete">🗑 删除</button>
                <button class="btn-rec-submit" id="btnRecSubmit">✓ 提交</button>
            </div>
        </div>
    </div>

    <!-- 安静提示 -->
    <div class="quiet-tip" id="quietTip" style="display:none;">
        <div class="quiet-icon">🤫</div>
        <div class="quiet-text">请保持环境安静</div>
        <div class="quiet-sub">即将开始录音...</div>
    </div>

    <!-- 倒计时（右上角） -->
    <div class="countdown-overlay countdown-corner" id="countdownOverlay" style="display:none;">
        <div class="countdown-num" id="countdownNum">3</div>
    </div>

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="js/config.js?v=20260418b"></script>
    <script src="js/record.js?v=20260418b"></script>
</body>
</html>
