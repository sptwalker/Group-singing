services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youdoo-sing
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据卷（数据库、上传文件、合成成曲）
      - youdoo-data:/app/backend/data
      - youdoo-uploads:/app/backend/uploads
      - youdoo-finals:/app/backend/finals
      # 挂载本地音乐库（只读）
      - ../music:/music:ro
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/youdoo_sing
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-deepseek-ai/DeepSeek-V3}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: youdoo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youdoo_sing
    volumes:
      - youdoo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: youdoo-redis
    restart: unless-stopped
    volumes:
      - youdoo-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  youdoo-data:
    driver: local
  youdoo-uploads:
    driver: local
  youdoo-finals:
    driver: local
  youdoo-pgdata:
    driver: local
  youdoo-redis:
    driver: local
