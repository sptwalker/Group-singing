services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youdoo-sing
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - youdoo-data:/app/backend/data
      - youdoo-uploads:/app/backend/uploads
      - youdoo-finals:/app/backend/finals
      - ../music:/music:ro
    environment:
      - DEBUG=false
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-youdoo}:${MYSQL_PASSWORD:-youdoo}@db:3306/${MYSQL_DB:-youdoo_sing}?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-deepseek-ai/DeepSeek-V3}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mysql:8.0
    container_name: youdoo-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-youdoo_sing}
      MYSQL_USER: ${MYSQL_USER:-youdoo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-youdoo}
    volumes:
      - youdoo-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: youdoo-redis
    restart: unless-stopped
    volumes:
      - youdoo-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  youdoo-data:
    driver: local
  youdoo-uploads:
    driver: local
  youdoo-finals:
    driver: local
  youdoo-mysql:
    driver: local
  youdoo-redis:
    driver: local
