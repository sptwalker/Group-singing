# 轻量开发模式：仅应用容器，使用本地 JSON 文件存储（无需 PostgreSQL/Redis）

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youdoo-sing-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "80:80"
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]
    volumes:
      # 开发模式：直接挂载本地目录，代码修改即时生效
      - ./backend:/app/backend
      - ./frontend/public:/app/frontend/public
      - ../music:/music:ro
    environment:
      - DEBUG=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-deepseek-ai/DeepSeek-V3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
